<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Absen SPPG Seribanding</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#16a34a" />

    <link rel="apple-touch-icon" href="icon/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap");

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #f8fafc;
        color: #1e293b;
        overflow: hidden;
        height: 100vh;
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      }

      .face-focus-box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 250px;
        height: 250px;
        border: 2px solid rgba(79, 70, 229, 0.1);
        border-radius: 40px;
        z-index: 45;
      }

      .corner {
        position: absolute;
        width: 30px;
        height: 30px;
        border: 4px solid #4f46e5;
        animation: pulse-border 1.5s infinite;
      }

      .t-l {
        top: -2px;
        left: -2px;
        border-right: 0;
        border-bottom: 0;
        border-radius: 15px 0 0 0;
      }
      .t-r {
        top: -2px;
        right: -2px;
        border-left: 0;
        border-bottom: 0;
        border-radius: 0 15px 0 0;
      }
      .b-l {
        bottom: -2px;
        left: -2px;
        border-right: 0;
        border-top: 0;
        border-radius: 0 0 0 15px;
      }
      .b-r {
        bottom: -2px;
        right: -2px;
        border-left: 0;
        border-top: 0;
        border-radius: 0 0 15px 0;
      }

      .loading-spinner-ai {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80px;
        height: 80px;
        border: 4px solid rgba(79, 70, 229, 0.1);
        border-top: 4px solid #4f46e5;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        display: none;
      }

      @keyframes pulse-border {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(1.05);
        }
      }

      @keyframes spin {
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="p-6">
    <audio
      id="sound-success"
      src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
      preload="auto"
    ></audio>
    <audio
      id="sound-error"
      src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
      preload="auto"
    ></audio>

    <div
      id="system-modal"
      class="fixed inset-0 z-[100] flex items-center justify-center bg-white/60 backdrop-blur-sm hidden opacity-0 transition-all duration-300"
    >
      <div
        class="glass-panel p-8 rounded-[40px] max-w-sm w-full mx-4 border border-indigo-100 text-center shadow-2xl"
      >
        <div
          id="modal-icon"
          class="w-20 h-20 mx-auto mb-6 rounded-3xl flex items-center justify-center"
        ></div>
        <h3
          id="modal-title"
          class="text-2xl font-black mb-2 uppercase text-slate-800"
        >
          Status
        </h3>
        <p id="modal-message" class="text-slate-500 font-medium"></p>
      </div>
    </div>

    <main class="flex gap-6 h-full w-full">
      <div class="w-1/2 flex flex-col gap-4">
        <div
          class="flex-1 relative rounded-[40px] overflow-hidden border border-slate-200 bg-slate-100 shadow-sm"
        >
          <div
            id="rfid-screen"
            class="absolute inset-0 z-50 glass-panel flex flex-col items-center justify-center text-center p-6 transition-all duration-500"
          >
            <div
              class="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center mb-6 animate-pulse border border-indigo-100"
            >
              <i data-feather="rss" class="w-12 h-12 text-indigo-600"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2 uppercase">
              Ready to Scan
            </h2>
            <p class="text-slate-500 text-sm">Tempelkan kartu RFID Anda</p>
            <input
              type="text"
              id="rfid-listener"
              class="absolute opacity-0 pointer-events-none"
              autofocus
            />
          </div>

          <div
            id="face-screen"
            class="absolute inset-0 opacity-0 pointer-events-none transition-all duration-700 scale-110"
          >
            <video
              id="video"
              class="w-full h-full object-cover absolute inset-0"
              autoplay
              muted
              playsinline
            ></video>
            <div
              id="ai-container"
              class="absolute inset-0 flex items-center justify-center"
            >
              <div class="face-focus-box">
                <div class="corner t-l"></div>
                <div class="corner t-r"></div>
                <div class="corner b-l"></div>
                <div class="corner b-r"></div>
              </div>
              <div id="ai-loading" class="loading-spinner-ai"></div>
            </div>
            <div
              class="absolute bottom-6 left-6 right-6 flex justify-between items-end z-30"
            >
              <div
                class="bg-white/90 backdrop-blur-md px-5 py-3 rounded-2xl shadow-sm border border-slate-100"
              >
                <p
                  class="text-[10px] uppercase font-bold text-indigo-600 tracking-widest"
                >
                  Biometric AI
                </p>
                <p id="status-text" class="text-xs font-bold text-slate-700">
                  Menganalisis Wajah...
                </p>
              </div>
              <div
                id="clock"
                class="text-3xl font-black tracking-tighter text-indigo-600"
              >
                00:00:00
              </div>
            </div>
          </div>

          <div
            id="success-overlay"
            class="absolute inset-0 z-[60] bg-indigo-600 flex-col items-center justify-center hidden"
          >
            <div
              class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4"
            >
              <i data-feather="check" class="text-indigo-600 w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-white">BERHASIL</h2>
          </div>
        </div>

        <div
          class="h-20 glass-panel rounded-[30px] px-8 flex items-center gap-4 border border-slate-100 shadow-sm"
        >
          <div
            class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200"
          >
            <img src="assets/image/bgn.png" />
          </div>
          <div class="leading-tight">
            <h1
              class="text-lg font-black text-slate-800 tracking-tight uppercase"
            >
              SPPG Seribanding
            </h1>
            <p
              class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest"
            >
              Jalan Seribanding,
            </p>
          </div>
        </div>
      </div>

      <div class="w-1/2 flex flex-col gap-4">
        <div
          class="glass-panel rounded-[40px] p-8 flex flex-col gap-6 flex-1 overflow-hidden"
        >
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-5">
              <div
                id="user-avatar-container"
                class="w-16 h-16 rounded-2xl bg-indigo-50 flex items-center justify-center border border-indigo-100"
              >
                <i data-feather="user" class="text-indigo-600 w-8 h-8"></i>
              </div>
              <div>
                <h2
                  id="display-name"
                  class="text-2xl font-black text-slate-800"
                >
                  Selamat Datang
                </h2>
                <p
                  id="display-divisi"
                  class="text-sm text-slate-400 font-medium"
                >
                  Silahkan Scan Kartu
                </p>
              </div>
            </div>
            <div
              id="battery-status"
              class="flex flex-col items-end gap-1 px-4 py-2 bg-slate-50 rounded-2xl border border-slate-100"
            >
              <div class="flex items-center gap-2">
                <span
                  id="battery-level"
                  class="text-xs font-black text-slate-600"
                  >--%</span
                >
                <i
                  id="battery-icon"
                  data-feather="battery"
                  class="w-4 h-4 text-slate-400"
                ></i>
              </div>
              <span
                class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter"
                >Device Power</span
              >
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="p-5 bg-orange-50 rounded-3xl border border-orange-100">
              <p
                class="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-1"
              >
                Menu Hari Ini
              </p>
              <h3
                id="info-menu"
                class="text-lg font-extrabold text-orange-900 leading-tight"
              >
                Memuat...
              </h3>
            </div>
            <div class="p-5 bg-blue-50 rounded-3xl border border-blue-100">
              <p
                class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1"
              >
                Penerima Manfaat
              </p>
              <h3
                id="info-penerima"
                class="text-2xl font-extrabold text-blue-900"
              >
                0
              </h3>
            </div>
          </div>

          <div class="flex-1 flex flex-col min-h-0">
            <p
              class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4"
            >
              Jam Masuk Divisi
            </p>
            <div
              id="divisi-list"
              class="space-y-2 overflow-y-auto custom-scrollbar pr-2"
            >
              <p class="text-xs text-slate-400 italic">
                Mengambil data jadwal...
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="user.js"></script>
    <script>
      feather.replace();
      const rfidInput = document.getElementById("rfid-listener");
      document.addEventListener("click", () => rfidInput.focus());

      setInterval(() => {
        document.getElementById("clock").innerText =
          new Date().toLocaleTimeString("en-GB");
      }, 1000);

      // Battery Logic with Progress Bar & Compatibility Fix
      if ("getBattery" in navigator) {
        navigator.getBattery().then((battery) => {
          function updateBattery() {
            const level = Math.floor(battery.level * 100);
            const levelText = document.getElementById("battery-level");
            const bar = document.getElementById("battery-bar");
            const iconElement = document.getElementById("battery-icon");

            if (levelText) levelText.innerText = level + "%";
            if (bar) {
              bar.style.width = level + "%";
              // Warna status bar
              if (level < 20 && !battery.charging) {
                bar.className = "h-full bg-red-500 transition-all duration-500";
              } else if (battery.charging) {
                bar.className =
                  "h-full bg-blue-500 transition-all duration-500";
              } else {
                bar.className =
                  "h-full bg-green-500 transition-all duration-500";
              }
            }

            if (iconElement) {
              let icon = battery.charging ? "battery-charging" : "battery";
              iconElement.setAttribute("data-feather", icon);
              feather.replace();
            }
          }

          // Jalankan saat awal
          updateBattery();

          // Gunakan On-Event Handler untuk kompatibilitas lebih luas
          battery.onlevelchange = () => updateBattery();
          battery.onchargingchange = () => updateBattery();

          // Tetap sediakan addEventListener sebagai fallback (opsional)
          if (typeof battery.addEventListener === "function") {
            battery.addEventListener("levelchange", updateBattery);
            battery.addEventListener("chargingchange", updateBattery);
          }
        });
      }
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then(() => console.log("Service Worker Registered"));
      }

      document.addEventListener("contextmenu", (event) =>
        event.preventDefault(),
      );
    </script>
  </body>
</html>
